name: Release Desktop Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: bash
        run: |
          # windows-latest ships VS 2026; need npm/node-gyp that recognize VS 18.x
          npm install -g npm@latest
          npm ci --ignore-scripts
          npm --prefix client ci --no-fund --no-audit
          npm install node-gyp@12 --no-save --no-fund --no-audit

      - name: Prepare build assets
        shell: bash
        run: |
          export npm_config_python="$(python -c 'import sys; print(sys.executable)')"
          export PYTHON="$npm_config_python"
          npm --prefix client run build
          node scripts/prepare-vendor.mjs
          node scripts/prepare-app-bundle.mjs
          node scripts/prepare-node-runtime.mjs

      - name: Build Electron (Windows)
        run: npx electron-builder --win --publish never

      - name: Build portable package
        run: node scripts/package-portable.mjs

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/electron/*.exe
            dist/electron/*.blockmap
            dist/electron/latest.yml
            dist/portable/*.zip
          if-no-files-found: error

  build-macos:
    strategy:
      matrix:
        arch: [x64, arm64]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Prefer Python 3.12 for native builds
        run: |
          brew install python@3.12
          echo "npm_config_python=$(brew --prefix python@3.12)/bin/python3.12" >> "$GITHUB_ENV"
          echo "PYTHON=$(brew --prefix python@3.12)/bin/python3.12" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          npm --prefix client ci --no-fund --no-audit
          npm install node-gyp@12 --no-save --no-fund --no-audit

      - name: Prepare build assets
        run: |
          npm --prefix client run build
          node scripts/prepare-vendor.mjs
          node scripts/prepare-app-bundle.mjs
          node scripts/prepare-node-runtime.mjs

      - name: Build Electron (macOS ${{ matrix.arch }})
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Build portable package
        if: matrix.arch == 'arm64'
        run: node scripts/package-portable.mjs

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            dist/electron/*.dmg
            dist/electron/*.zip
            dist/electron/*.blockmap
            dist/electron/latest-mac.yml
            dist/portable/*.tar.gz
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          npm --prefix client ci --no-fund --no-audit
          npm install node-gyp@12 --no-save --no-fund --no-audit

      - name: Prepare build assets
        run: |
          npm --prefix client run build
          node scripts/prepare-vendor.mjs
          node scripts/prepare-app-bundle.mjs
          node scripts/prepare-node-runtime.mjs

      - name: Build Electron (Linux)
        run: npx electron-builder --linux --publish never

      - name: Build portable package
        run: node scripts/package-portable.mjs

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/electron/*.AppImage
            dist/electron/*.deb
            dist/electron/latest-linux.yml
            dist/portable/*.tar.gz
          if-no-files-found: error

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Resolve version
        id: meta
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect release assets
        id: assets
        run: |
          shopt -s nullglob globstar
          mapfile -t files < <(find artifacts -type f \( \
            -name '*.exe' -o -name '*.dmg' -o -name '*.zip' -o \
            -name '*.AppImage' -o -name '*.deb' -o -name '*.tar.gz' -o \
            -name '*.blockmap' -o -name 'latest*.yml' \
          \) | sort)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release assets found under artifacts/" >&2
            find artifacts -maxdepth 3 -type f | head -50 >&2 || true
            exit 1
          fi
          printf '%s\n' "${files[@]}"
          {
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Noe-SSH v${{ steps.meta.outputs.version }}
          body_path: .github/release-notes/v${{ steps.meta.outputs.version }}.md
          files: ${{ steps.assets.outputs.files }}
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
